services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gaf-wifi-app
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BASE_URL=http://192.168.11.10
      - JWT_EXPIRY=8h
      # JWT_SECRET intentionally omitted — auto-generated on first start
      # and persisted to /app/data/.secret via the volume below
    volumes:
      # Persist database and JWT secret across container restarts/rebuilds
      - db_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  nginx:
    image: nginx:alpine
    container_name: gaf-wifi-nginx
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
    driver: local
