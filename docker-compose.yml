services:
  app:
    build: .
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    volumes:
      - db_data:/app/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
