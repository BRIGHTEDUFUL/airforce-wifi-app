<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GAF HQ WiFi Management System</title>
    <meta name="description" content="Ghana Air Force HQ — Secure WiFi & Credential Management Portal" />
    <meta name="robots" content="noindex, nofollow" />
    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <!-- Prevent flash of wrong theme on load -->
    <script>
      (function() {
        var saved = localStorage.getItem('afkm_theme');
        // If no preference saved, or saved as 'system', default to light
        if (saved === 'dark') {
          document.documentElement.classList.add('dark');
        } else if (saved === 'system') {
          // system follows OS
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        }
        // 'light' or null = no dark class (light mode)
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
