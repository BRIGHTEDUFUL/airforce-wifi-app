# GAF WiFi — dnsmasq LAN DNS config
# Deployed to: /etc/dnsmasq.d/wifiapp.conf
# Resolves wifiapp.airforce → 192.168.11.10 for all LAN devices

# Listen on all interfaces
listen-address=0.0.0.0
bind-interfaces

# Resolve domain and wildcard subdomains to server IP
address=/wifiapp.airforce/192.168.11.10
address=/.wifiapp.airforce/192.168.11.10

# Upstream DNS — forward everything else
server=8.8.8.8
server=1.1.1.1

# Don't use /etc/resolv.conf
no-resolv

# Cache size
cache-size=1000
