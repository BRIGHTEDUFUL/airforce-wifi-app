# GAF WiFi Management System — nginx site config
# For bare Node + nginx deployment (non-Docker)
#
# Install:
#   sudo cp /var/www/airforce-wifi-app/nginx/gaf-wifi.conf /etc/nginx/sites-available/gaf-wifi
#   sudo ln -s /etc/nginx/sites-available/gaf-wifi /etc/nginx/sites-enabled/gaf-wifi
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

map $http_upgrade $connection_upgrade {
    default   keep-alive;
    websocket upgrade;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # Health check — no logging
    location = /api/health {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }
}
