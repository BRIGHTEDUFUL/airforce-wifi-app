# GAF WiFi Management System — nginx site config
# Listens on port 80, serves all LAN devices via reverse proxy to Node on :3000
#
# Install:
#   sudo cp /var/www/airforce-wifi-app/nginx/gaf-wifi.conf /etc/nginx/sites-available/gaf-wifi
#   sudo ln -sf /etc/nginx/sites-available/gaf-wifi /etc/nginx/sites-enabled/gaf-wifi
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    # Accept connections on all interfaces — LAN devices hit port 80
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _ 192.168.11.10;

    client_max_body_size  10M;
    client_body_timeout   60s;
    client_header_timeout 30s;
    keepalive_timeout     65s;
    send_timeout          60s;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1000;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        image/svg+xml
        application/wasm;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-XSS-Protection       "1; mode=block"                   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Static assets — cache forever (Vite uses content-hashed filenames) ───
    location ~* ^/assets/.+\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|wasm)$ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # ── API — no caching, pass real client IP ─────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        add_header Cache-Control "no-store" always;
    }

    # ── Health check — silent ─────────────────────────────────────────────────
    location = /api/health {
        proxy_pass  http://127.0.0.1:3000;
        access_log  off;
        add_header  Cache-Control "no-store" always;
    }

    # ── SPA + WebSocket fallback ──────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket upgrade support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        proxy_buffering         on;
        proxy_buffer_size       8k;
        proxy_buffers           16 8k;
        proxy_busy_buffers_size 16k;
    }
}
