# GAF WiFi Management System — nginx site config
# Install:
#   sudo cp /var/www/airforce-wifi-app/nginx/gaf-wifi.conf /etc/nginx/sites-available/gaf-wifi
#   sudo ln -s /etc/nginx/sites-available/gaf-wifi /etc/nginx/sites-enabled/gaf-wifi
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 10M;
    client_body_timeout  30s;
    client_header_timeout 30s;
    keepalive_timeout    65s;
    send_timeout         30s;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;

        # WebSocket support
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Pass real client info to Express
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass  $http_upgrade;

        # Timeouts — generous for slow LAN devices
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # Buffering — helps slow clients
        proxy_buffering         on;
        proxy_buffer_size       8k;
        proxy_buffers           16 8k;
        proxy_busy_buffers_size 16k;
    }

    # Health check — silent
    location = /api/health {
        proxy_pass  http://127.0.0.1:3000;
        access_log  off;
    }
}
